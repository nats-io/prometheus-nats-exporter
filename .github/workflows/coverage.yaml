name: Test Coverage
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions: {}

# We only run on the main branch, not candidates for merging, so coverage tests
# are not gating factors where we should cancel the previous run, but a
# historical record of coverage of main.  So we deliberately choose to leave
# existing workflow invocations running.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Setup Goveralls
        run: go install github.com/mattn/goveralls@v0.0.12

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0

      - name: Run Tests
        run: make test-cov

      - name: Run Coveralls
        run: goveralls -coverprofile=collector.out,exporter.out -service=github
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
