name: Release
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions: {}

# This would trigger if we ... move a release tag?  Ugh.  Would prefer to flag that as a poisoning error and kill all builds.
# We'll settle for killing the prior one.
# This should resolve a Zizmor v1.16+ "concurrency-limits" check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # goreleaser (inside bake) release assets upload
      # The images are pushed to DockerHub via static secret, so we don't need packages:write here

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Setup Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_CLI_TOKEN }}

      - name: Get Image Tags
        id: tags
        run: |
          version=$(sed 's/^v//' <<< "${GITHUB_REF_NAME}")
          echo tags="latest,${version}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        env:
          TAGS: "${{ steps.tags.outputs.tags }}"
          REGISTRY: "natsio"
          SNAPSHOT: "false"
          GITHUB_RUN_ID: "${{ github.run_id }}"
        with:
          source: .
          files: docker-bake.hcl
          push: true
          set: |
            goreleaser.args.GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
